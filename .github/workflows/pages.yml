name: Pages Coverage

on:
  push:
    branches:
      - main
      - JB/183-test-code-coverage
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build coverage reports
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bigdataenergy
          POSTGRES_PASSWORD: bigdataenergy
          POSTGRES_DB: big_data_energy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci

      - name: Create .env for mobile tests
        working-directory: mobile
        run: |
          echo "TARGET=emulator" > .env
          echo "API_BASE_URL_EMULATOR=http://localhost:8080" >> .env

      - name: Run mobile tests with coverage
        working-directory: mobile
        run: npm test -- --coverage --watchAll=false --ci
        env:
          CI: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Run backend tests with JaCoCo
        working-directory: backend
        run: ./mvnw -B -ntp clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/big_data_energy
          SPRING_DATASOURCE_USERNAME: bigdataenergy
          SPRING_DATASOURCE_PASSWORD: bigdataenergy
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Assemble Pages site
        run: |
          mkdir -p site/mobile
          mkdir -p site/backend
          cp -R mobile/coverage/* site/mobile/
          cp -R backend/target/site/jacoco/* site/backend/
          echo "<html>
                  <body>
                      <h1>Coverage Reports</h1>
                      <ul>
                        <li><a href='mobile/index.html'>Frontend Coverage</a></li>
                        <li><a href='backend/index.html'>Backend Coverage</a></li>
                      </ul>
                  </body>
          </html>" > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
